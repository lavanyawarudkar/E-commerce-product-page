<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Men's Watch Store</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

    <div class="image">
        <img src="https://images.unsplash.com/photo-1523170335258-f5ed11844a49?w=600" alt="Watch">
    </div>

    <div class="details">

        <h1>Classic Men's Wrist Watch</h1>

        <div class="rating">
            ★★★★★ (4.8/5)
        </div>

        <div class="price">
            ₹2,999
            <span class="old-price">₹3,999</span>
        </div>

        <p>
            Upgrade your style with this premium men's wrist watch.
            It has a stainless steel strap, water resistance and a modern design.
        </p>

        <ul class="features">
            <li>Premium Quality</li>
            <li>Water Resistant</li>
            <li>Stainless Steel Strap</li>
            <li>1 Year Warranty</li>
            <li>Free Delivery</li>
        </ul>

        <button>Add to Cart</button>

    </div>

</div>

</body>
</html>
